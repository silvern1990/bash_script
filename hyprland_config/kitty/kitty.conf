# font_family	Unifont
# bold_font	auto
italic_font	auto
# bold_italic_font auto
modify_font cell_width -50%
background #1a1a1a
background_opacity 1

font_size	12



# BEGIN_KITTY_FONTS
font_family      family="Unifont"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS

enabled_layouts splits

tab_bar_style separator
tab_bar_edge top

map ctrl+\ launch --location=hsplit
map ctrl+shift+\ launch --location=vsplit

map alt+h neighboring_window left
map alt+j neighboring_window bottom
map alt+k neighboring_window top
map alt+l neighboring_window right

map alt+shift+h move_window left
map alt+shift+j move_window bottom
map alt+shift+k move_window top
map alt+shift+l move_window right

map ctrl+alt+h resize_window narrower 5
map ctrl+alt+l resize_window wider 5
map ctrl+alt+k resize_window taller 5
map ctrl+alt+j resize_window shorter 5


map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map alt+6 goto_tab 6
map alt+7 goto_tab 7
map alt+8 goto_tab 8
map alt+9 goto_tab 9
